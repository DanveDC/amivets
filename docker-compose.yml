version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: veterinaria_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vetuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetpass123}
      POSTGRES_DB: ${POSTGRES_DB:-veterinaria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - veterinaria_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetuser} -d ${POSTGRES_DB:-veterinaria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veterinaria_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vetuser}:${POSTGRES_PASSWORD:-vetpass123}@db:5432/${POSTGRES_DB:-veterinaria_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      - ./backend:/app
      - ./static:/app/static
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - veterinaria_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: veterinaria_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - backend
    networks:
      - veterinaria_network

volumes:
  postgres_data:

networks:
  veterinaria_network:
    driver: bridge
